name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install QEMU
        run: sudo apt-get install -y qemu-system-x86

      - name: Build
        run: zig build

      - name: Test (all)
        run: zig build test-all
