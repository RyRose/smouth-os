name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Install QEMU
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: qemu-system-x86
          version: 1.0
      - name: Build
        run: zig build
      - name: Test (unit)
        run: zig build test
      - name: Test (kernel)
        run: zig build test-x86
      - name: Test (arch)
        run: zig build test-arch-x86
